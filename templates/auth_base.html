<!DOCTYPE html>
<html lang="en" data-theme="forest">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}fAishon{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .floating-box {
            border-radius: var(--rounded-box, 1rem);
        }

        /* Hide scrollbars globally */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body
    class="min-h-screen w-screen bg-base-200 text-base-content overflow-y-auto flex flex-col transition-colors duration-300">

    <!-- Simple Auth Navbar -->
    <header class="w-full p-4 flex justify-between items-center max-w-7xl mx-auto">
        <a href="{% url 'landing' %}" class="hover:opacity-80 transition-opacity">
            <span class="text-3xl font-bold text-base-content">f<span class="text-primary">Ai</span>shon</span>
        </a>

        <div class="flex gap-4">
            <a href="{% url 'login' %}" class="btn btn-ghost px-6">Log in</a>
            <a href="{% url 'signup' %}" class="btn btn-primary px-6 shadow-md shadow-primary/30">Sign up</a>
        </div>
    </header>

    <!-- Main Content Area centered -->
    <main class="flex-1 w-full max-w-7xl mx-auto flex flex-col justify-center items-center p-4 py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Base Scripts for Theme Fallback -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize lucide icons
            lucide.createIcons();

            // --- Theme Handling ---
            const savedTheme = localStorage.getItem('faishon_theme_new') || 'forest';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
    </script>
</body>

</html>
